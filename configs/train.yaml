seed: 42
mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "deidentifier_training"

data:
  input_path: "data/processed/synthetic_trainval.csv"
  text_column: "text"
  label_column: "label"
  id_column: "id"
  test_size: 0.2

model:
  model_name: "distilbert-base-uncased"
  max_length: 128

training:
  learning_rate: 2.0e-5
  batch_size: 8
  epochs: 1
  weight_decay: 0.01
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_steps: 10

output:
  base_dir: "artifacts"
  model_dir: "artifacts/model"
  predictions_path: "artifacts/predictions/val_predictions.csv"
  metrics_path: "artifacts/reports/train_metrics.json"
