seed: 42

mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "deidentifier_optuna"

data:
  input_path: "data/processed/sample_labeled.csv"
  text_column: "text"
  label_column: "label"
  id_column: "id"
  test_size: 0.2

model:
  model_name: "distilbert-base-uncased"
  max_length: 128

search:
  metric_to_optimize: "eval_f1_macro"
  direction: "maximize"
  n_trials: 2

space:
  learning_rate:
    low: 1.0e-5
    high: 5.0e-5
    log: true
  batch_size:
    choices: [4, 8]
  epochs:
    low: 1
    high: 2
  weight_decay:
    low: 0.0
    high: 0.1

fixed_training:
  eval_strategy: "epoch"
  save_strategy: "no"
  logging_steps: 10

output:
  best_params_path: "artifacts/reports/optuna_best_params.json"
  trials_path: "artifacts/reports/optuna_trials.csv"
  temp_model_dir: "artifacts/model_optuna"
